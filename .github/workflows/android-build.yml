name: Android APK Build

on:
  push:
    branches: [main]
    paths:
      - 'android_agent/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle/**'
      - '.github/workflows/android-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'android_agent/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle/**'
      - '.github/workflows/android-build.yml'
  workflow_dispatch:

# Grant the minimum permissions needed by every job.
# pull-requests: read is required so actions/checkout can fetch the
# GitHub-generated merge commit ref (refs/pull/N/merge) on PR runs.
# Without it the runner gets "Repository not found" when fetching that ref.
permissions:
  contents: read
  pull-requests: read

# ─────────────────────────────────────────────────────────────────────────────
# Shared setup action (avoids repeating JDK + cache steps in every job)
# ─────────────────────────────────────────────────────────────────────────────
env:
  GRADLE_OPTS: -Dfile.encoding=UTF-8

jobs:

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1 — Static analysis (Android Lint)
  # Catches resource errors, API-level issues, deprecated usages
  # ───────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant Gradle wrapper execute permission
        run: chmod +x gradlew

      - name: Install Android SDK 35 and create local.properties
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Run Android Lint
        run: ./gradlew :android_agent:lintDebug --no-daemon

      - name: Upload Lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report-${{ github.sha }}
          path: android_agent/build/reports/lint-results-debug.html
          retention-days: 14

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 — Unit tests (JVM, no emulator)
  # Covers AgentLoop, ToolRegistry, GeminiApiLlmInference, CosineSimilarity
  # ───────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant Gradle wrapper execute permission
        run: chmod +x gradlew

      - name: Install Android SDK 35 and create local.properties
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Run unit tests
        run: ./gradlew :android_agent:testDebugUnitTest --no-daemon --stacktrace

      - name: Publish test results summary
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Unit Test Results
          path: android_agent/build/test-results/testDebugUnitTest/*.xml
          reporter: java-junit
          fail-on-error: true

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ github.sha }}
          path: android_agent/build/reports/tests/testDebugUnitTest/
          retention-days: 14

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3 — Build debug APK
  # Runs only after lint and unit tests pass
  # ───────────────────────────────────────────────────────────────────────────
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant Gradle wrapper execute permission
        run: chmod +x gradlew

      - name: Install Android SDK 35 and create local.properties
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Build debug APK
        run: ./gradlew :android_agent:assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: gemcode-debug-${{ github.sha }}
          path: android_agent/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload build reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports-${{ github.sha }}
          path: android_agent/build/reports/
          retention-days: 7

      - name: Write job summary
        if: success()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| APK Build | ✅ Succeeded |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          APK_PATH=$(find android_agent/build/outputs/apk/debug -name "*.apk" | head -1)
          APK_SIZE=$(du -sh "$APK_PATH" 2>/dev/null | cut -f1)
          echo "**APK:** \`$(basename $APK_PATH)\` — $APK_SIZE" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
