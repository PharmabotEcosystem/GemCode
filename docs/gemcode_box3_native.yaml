substitutions:
  name: gemcode-native
  friendly_name: GemCode Native Base
  wifi_ssid: !secret gemcode_wifi_ssid
  wifi_password: !secret gemcode_wifi_password
  api_encryption_key: !secret gemcode_api_encryption_key

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: true
  min_version: "2026.3.0"
  on_boot:
    priority: 300
    then:
      - switch.turn_on: internal_speaker_amp
      - script.execute: show_led_mode
      - logger.log: "GemCode native base avviato"

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  cpu_frequency: 240MHz
  flash_size: 16MB
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_ESP32S3_INSTRUCTION_CACHE_32KB: "y"
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"

psram:
  mode: octal
  speed: 80MHz
  ignore_not_found: false

wifi:
  ssid: ${wifi_ssid}
  password: ${wifi_password}
  ap:
    ssid: "${friendly_name} Fallback"
    password: "gemcode123"

api:
  encryption:
    key: ${api_encryption_key}

ota:
  - platform: esphome

logger:
  level: DEBUG
  hardware_uart: USB_SERIAL_JTAG

web_server:
  port: 80

captive_portal:

mdns:

power_supply:
  - id: led_power
    pin: GPIO45

switch:
  - platform: gpio
    pin: GPIO47
    id: internal_speaker_amp
    restore_mode: ALWAYS_ON
    internal: true

light:
  - platform: esp32_rmt_led_strip
    id: led_ring
    name: LED Ring
    pin: GPIO21
    chipset: WS2812
    num_leds: 12
    rgb_order: grb
    default_transition_length: 0ms
    power_supply: led_power

globals:
  - id: led_mode
    type: int
    restore_value: no
    initial_value: '0'

script:
  - id: show_led_mode
    then:
      - if:
          condition:
            lambda: return id(led_mode) == 0;
          then:
            - light.turn_on:
                id: led_ring
                red: 0%
                green: 0%
                blue: 100%
                brightness: 60%
      - if:
          condition:
            lambda: return id(led_mode) == 1;
          then:
            - light.turn_on:
                id: led_ring
                red: 100%
                green: 30%
                blue: 0%
                brightness: 60%
      - if:
          condition:
            lambda: return id(led_mode) == 2;
          then:
            - light.turn_on:
                id: led_ring
                red: 0%
                green: 100%
                blue: 20%
                brightness: 60%

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      inverted: true
    id: center_button
    name: Button
    on_press:
      then:
        - lambda: |-
            id(led_mode) = (id(led_mode) + 1) % 3;
        - script.execute: show_led_mode
        - logger.log: "Button premuto: cambio colore LED"

button:
  - platform: restart
    name: Restart
  - platform: factory_reset
    name: Factory reset

text_sensor:
  - platform: wifi_info
    ip_address:
      name: IP Address