substitutions:
  name: gemcode-satellite
  friendly_name: GemCode Voice Satellite
  wifi_ssid: !secret gemcode_wifi_ssid
  wifi_password: !secret gemcode_wifi_password
  api_encryption_key: !secret gemcode_api_encryption_key

# =============================================================================
# GemCode Voice Satellite — Home Assistant Voice Preview Edition (Voice PE)
# Chip: ESP32-S3R8 (8MB PSRAM embedded)  MAC: 98:3d:ae:ee:00:d4
# =============================================================================

external_components:
  # voice_kit gestisce il chip XMOS DSP (echo cancellation, clock I2S secondario)
  # OBBLIGATORIO: senza questo il microfono non riceve clock e non funziona
  - source:
      type: git
      url: https://github.com/esphome/home-assistant-voice-pe
      ref: dev
    components:
      - voice_kit
    refresh: 0s

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: true
  min_version: "2026.3.0"
  on_boot:
    priority: 375
    then:
      - switch.turn_on: internal_speaker_amp
      - delay: 1s
      - script.execute: reset_led
      - logger.log: "GemCode Voice PE avviato!"

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  cpu_frequency: 240MHz
  flash_size: 16MB
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_ESP32S3_INSTRUCTION_CACHE_32KB: "y"
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"

psram:
  mode: octal
  speed: 80MHz
  ignore_not_found: false

i2c:
  - id: internal_i2c
    sda: GPIO5
    scl: GPIO6
    frequency: 400kHz

i2s_audio:
  - id: i2s_output
    i2s_lrclk_pin: GPIO7
    i2s_bclk_pin: GPIO8
  - id: i2s_input
    i2s_lrclk_pin: GPIO14
    i2s_bclk_pin: GPIO13

microphone:
  - platform: i2s_audio
    id: box_mic
    i2s_din_pin: GPIO15
    adc_type: external
    pdm: false
    sample_rate: 16000
    bits_per_sample: 32bit
    i2s_mode: secondary
    i2s_audio_id: i2s_input
    channel: stereo

speaker:
  - platform: i2s_audio
    id: i2s_audio_speaker
    sample_rate: 48000
    i2s_mode: secondary
    i2s_dout_pin: GPIO10
    bits_per_sample: 32bit
    i2s_audio_id: i2s_output
    dac_type: external
    channel: stereo
    timeout: never
    buffer_duration: 100ms
    audio_dac: aic3204_dac
  - platform: resampler
    id: announcement_speaker
    output_speaker: i2s_audio_speaker
    sample_rate: 48000
    bits_per_sample: 16

audio_dac:
  - platform: aic3204
    id: aic3204_dac
    i2c_id: internal_i2c

power_supply:
  - id: led_power
    pin: GPIO45

switch:
  - platform: gpio
    pin: GPIO47
    id: internal_speaker_amp
    name: "Internal speaker amp"
    restore_mode: ALWAYS_OFF
    internal: true

light:
  - platform: esp32_rmt_led_strip
    id: led_ring
    pin: GPIO21
    chipset: WS2812
    num_leds: 12
    rgb_order: grb
    default_transition_length: 0ms
    power_supply: led_power
    name: LED Ring
    entity_category: config
    effects:
      - pulse:
          name: "Slow Pulse"
          transition_length: 500ms
          update_interval: 500ms
          min_brightness: 50%
          max_brightness: 100%
      - pulse:
          name: "Fast Pulse"
          transition_length: 100ms
          update_interval: 100ms
          min_brightness: 50%
          max_brightness: 100%

voice_kit:
  id: voice_kit_component
  i2c_id: internal_i2c
  reset_pin: GPIO4
  firmware:
    url: https://github.com/esphome/voice-kit-xmos-firmware/releases/download/v1.3.1/ffva_v1.3.1_upgrade.bin
    version: "1.3.1"
    md5: 964635c5bf125529dab14a2472a15401

media_player:
  - platform: speaker
    id: echo_media_player
    name: None
    announcement_pipeline:
      speaker: announcement_speaker
      format: FLAC
      num_channels: 1
      sample_rate: 48000
    codec_support_enabled: false
    volume_min: 0.4
    on_announcement:
      - light.turn_on:
          id: led_ring
          blue: 100%
          red: 0%
          green: 0%
          brightness: 100%
          effect: none
    on_idle:
      - script.execute: reset_led
      - script.execute: start_wake_word

micro_wake_word:
  id: mww
  microphone:
    microphone: box_mic
    channels: 0
    gain_factor: 4
  vad:
  models:
    - model: okay_nabu
    - model: hey_jarvis
    - model: hey_mycroft
  on_wake_word_detected:
    - voice_assistant.start:
        wake_word: !lambda return wake_word;

voice_assistant:
  id: va
  microphone:
    microphone: box_mic
    channels: 0
    gain_factor: 4
  media_player: echo_media_player
  micro_wake_word: mww
  noise_suppression_level: 2
  auto_gain: 31dBFS
  on_listening:
    - light.turn_on:
        id: led_ring
        blue: 100%
        red: 0%
        green: 0%
        brightness: 100%
        effect: "Slow Pulse"
  on_stt_vad_end:
    - light.turn_on:
        id: led_ring
        blue: 100%
        red: 0%
        green: 0%
        effect: "Fast Pulse"
  on_tts_start:
    - light.turn_on:
        id: led_ring
        blue: 100%
        red: 0%
        green: 0%
        brightness: 100%
        effect: none
  on_end:
    - wait_until:
        condition:
          - media_player.is_announcing:
        timeout: 0.5s
    - if:
        condition:
          - lambda: |-
              return id(wake_word_engine_location).current_option() == "On device";
        then:
          - wait_until:
              - and:
                  - not:
                      voice_assistant.is_running:
                  - not:
                        speaker.is_playing:
                          id: i2s_audio_speaker
          - lambda: id(va).set_use_wake_word(false);
          - micro_wake_word.start:
    - script.execute: reset_led
  on_error:
    - light.turn_on:
        id: led_ring
        red: 100%
        green: 0%
        blue: 0%
        brightness: 100%
        effect: none
    - delay: 2s
    - script.execute: reset_led
  on_client_connected:
    - lambda: id(init_in_progress) = false;
    - micro_wake_word.start:
  on_client_disconnected:
    - script.execute: stop_wake_word

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      inverted: true
    name: Button
    id: center_button
    on_multi_click:
      - timing:
          - ON for at most 1s
          - OFF for at least 0.25s
        then:
          - if:
              condition:
                voice_assistant.is_running:
              then:
                - voice_assistant.stop:
              else:
                - script.execute: start_wake_word
      - timing:
          - ON for at least 10s
        then:
          - button.press: factory_reset_btn

button:
  - platform: factory_reset
    id: factory_reset_btn
    name: Factory reset

globals:
  - id: init_in_progress
    type: bool
    restore_value: no
    initial_value: "true"

select:
  - platform: template
    entity_category: config
    name: Wake word engine location
    id: wake_word_engine_location
    optimistic: true
    restore_value: true
    options:
      - In Home Assistant
      - On device
    initial_option: On device
    on_value:
      - if:
          condition:
            lambda: return x == "In Home Assistant";
          then:
            - micro_wake_word.stop:
            - delay: 500ms
            - lambda: id(va).set_use_wake_word(true);
            - voice_assistant.start_continuous:
      - if:
          condition:
            lambda: return x == "On device";
          then:
            - lambda: id(va).set_use_wake_word(false);
            - voice_assistant.stop:
            - delay: 500ms
            - micro_wake_word.start:

script:
  - id: reset_led
    then:
      - light.turn_on:
          id: led_ring
          red: 0%
          green: 0%
          blue: 100%
          brightness: 60%
          effect: none
  - id: start_wake_word
    then:
      - if:
          condition:
            and:
              - not:
                  - voice_assistant.is_running:
              - lambda: |-
                  return id(wake_word_engine_location).current_option() == "On device";
          then:
            - lambda: id(va).set_use_wake_word(false);
            - micro_wake_word.start:
      - if:
          condition:
            and:
              - not:
                  - voice_assistant.is_running:
              - lambda: |-
                  return id(wake_word_engine_location).current_option() == "In Home Assistant";
          then:
            - lambda: id(va).set_use_wake_word(true);
            - voice_assistant.start_continuous:
  - id: stop_wake_word
    then:
      - micro_wake_word.stop:
      - lambda: id(va).set_use_wake_word(false);
      - voice_assistant.stop:

wifi:
  ssid: ${wifi_ssid}
  password: ${wifi_password}
  ap:
    ssid: "${friendly_name} Fallback"
    password: "gemcode123"

api:
  encryption:
    key: ${api_encryption_key}

logger:
  level: DEBUG

ota:
  - platform: esphome

captive_portal:
