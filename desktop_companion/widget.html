<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GemCode Companion</title>
  <script type="importmap">
  {
    "imports": {
      "three": "../node_modules/three/build/three.module.js"
    }
  }
  </script>
  <link rel="stylesheet" href="./widget.css" />
</head>
<body>
  <div class="drag-layer"></div>
  <div id="widgetRoot" class="widget-shell idle">
    <div class="aura-layer" id="auraLayer"></div>
    <div id="avatarStage" class="avatar-stage default-avatar">
      <div id="modelViewport" class="model-viewport" hidden></div>
      <img id="avatarAura" class="avatar-image aura" alt="" hidden />
      <img id="avatarBase" class="avatar-image base" alt="Avatar" hidden />
      <img id="avatarBlink" class="avatar-image blink" alt="Blink" hidden />
      <img id="avatarMouth" class="avatar-image mouth" alt="Mouth" hidden />
      <div id="syntheticFaceFx" class="synthetic-face-fx" hidden aria-hidden="true">
        <span class="synthetic-blink"></span>
        <span class="synthetic-mouth"></span>
      </div>

      <div id="fallbackAvatar" class="fallback-avatar">
        <div class="fallback-core"></div>
        <div class="fallback-face">
          <div class="eyes">
            <span class="eye left"></span>
            <span class="eye right"></span>
          </div>
          <span class="mouth"></span>
        </div>
      </div>
    </div>

    <div id="speechBubble" class="speech-bubble" hidden></div>

    <!-- Persona + status chips -->
    <div id="personaChip" class="persona-chip">GemCode</div>
    <div id="statusChip" class="status-chip">IDLE</div>

    <!-- FAB to toggle chat -->
    <button id="chatFab" class="chat-fab" title="Chat">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
    </button>

    <!-- Chat panel (slides in from bottom) -->
    <div id="chatPanel" class="chat-panel" hidden>
      <div class="chat-panel-header">
        <span class="chat-panel-title" id="chatPanelTitle">Chat</span>
        <div class="chat-panel-actions">
          <button id="settingsToggle" class="icon-btn" title="Impostazioni">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </button>
          <button id="chatClose" class="icon-btn" title="Chiudi chat">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>

      <!-- Settings drawer (inside chat panel) -->
      <div id="settingsDrawer" class="settings-drawer" hidden>
        <div class="settings-section">
          <h3>Avatar VaM</h3>
          <label>Preset avatar<select id="quickAvatarSelect"></select></label>
          <div id="presetGrid" class="preset-grid"></div>
          <div id="lookSummary" class="look-summary"></div>
          <div id="lookCategories" class="look-categories"></div>
        </div>
        <div class="settings-section">
          <h3>Personalizzazione disponibile</h3>
          <div id="libraryCatalog" class="library-catalog"></div>
        </div>
        <div class="settings-section">
          <h3>Voce</h3>
          <label>Voce TTS<input id="ttsVoiceInput" type="text" placeholder="it-IT-ElsaNeural"/></label>
          <label class="check-row"><input id="autoSpeakCheck" type="checkbox" checked/><span>Parla automaticamente</span></label>
        </div>
        <div class="settings-section">
          <h3>Widget</h3>
          <label>Scala<input id="scaleSlider" type="range" min="0.5" max="1.5" step="0.05" value="1"/></label>
          <label>Opacita<input id="opacitySlider" type="range" min="0.3" max="1" step="0.05" value="1"/></label>
          <label>Zoom avatar<input id="framingZoomSlider" type="range" min="0.3" max="3.0" step="0.05" value="1"/></label>
          <label>Altezza avatar<input id="framingOffsetSlider" type="range" min="-1.0" max="1.0" step="0.01" value="0"/></label>
          <label class="check-row"><input id="alwaysOnTopCheck" type="checkbox" checked/><span>Sempre in primo piano</span></label>
          <label class="check-row"><input id="showTranscriptCheck" type="checkbox" checked/><span>Nuvoletta frasi</span></label>
        </div>
        <div class="settings-section">
          <h3>Avanzate</h3>
          <button id="openStudioBtn" class="settings-btn">Apri Studio completo</button>
        </div>
      </div>

      <!-- Chat messages -->
      <div id="chatLog" class="chat-log"></div>

      <!-- Chat input -->
      <div class="chat-composer">
        <button id="micButton" class="icon-btn mic-btn" title="Microfono" hidden disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="1" width="6" height="11" rx="3"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        </button>
        <input id="chatInput" type="text" placeholder="Scrivi un messaggio..." autocomplete="off"/>
        <button id="sendButton" class="icon-btn send-btn" title="Invia">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>

  <script type="module" src="./widget.js"></script>
</body>
</html>
