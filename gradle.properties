# Gradle daemon JVM memory settings
org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8

# Build performance
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.caching=true

# AndroidX
android.useAndroidX=true

# KSP: suppress KSP1-processor warning from Room 2.6.x (resolved by Room 2.7.0 upgrade)
# Remove this line once Room 2.7.0 is confirmed stable in CI
warn.on.ksp1.usage=false
